<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>White Music Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --card-bg: rgba(255, 255, 255, 0.88);
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --progress-bg: #e5e7eb;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Видео-фон */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Затемнение фона для контраста */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: -1;
    }

    .player-wrapper {
      width: 100%;
      max-width: 340px;
      padding: 20px;
    }

    .player-card {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius);
      padding: 26px 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .cover {
      width: 200px;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .cover.playing img {
      animation: pulse 3s infinite ease-in-out;
    }

    .track-info { text-align: center; }
    .track-info h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 3px; }
    .track-info p { color: var(--text-secondary); font-size: 0.9rem; }

    /* Эквалайзер */
    #equalizer {
      width: 100%;
      height: 50px;
      border-radius: 8px;
      background: rgba(245, 245, 247, 0.8);
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--progress-bg);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.1s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .progress-bar:hover .progress-fill::after { opacity: 1; }

    .time-display {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    .btn {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.15rem;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .btn:hover { color: var(--accent); transform: scale(1.1); }

    .play-btn {
      width: 52px; height: 52px;
      background: var(--accent);
      border-radius: 50%;
      font-size: 1.4rem;
      color: #fff;
      box-shadow: 0 5px 12px rgba(79, 70, 229, 0.35);
    }

    .play-btn:hover { background: var(--accent-hover); color: #fff; transform: scale(1.06); }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding-top: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--progress-bg);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.025); }
    }

    @media (max-width: 400px) {
      .cover { width: 170px; height: 170px; }
      .player-card { padding: 20px 14px; }
    }
  </style>
</head>
<body>

  <!-- Видео-фон -->
  <video id="bg-video" autoplay loop muted playsinline>
    <source src="1655315665-1655315665-diamond-houseki-no-kuni-hd-live-wallpaper-for-pc.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <div class="player-wrapper">
    <div class="player-card">
      <div class="cover" id="cover">
        <img src="https://picsum.photos/seed/album1/400/400" alt="Обложка" id="cover-img">
      </div>
      <div class="track-info">
        <h2 id="title">Загрузка...</h2>
        <p id="artist">—</p>
      </div>

      <!-- Графический эквалайзер -->
      <canvas id="equalizer" width="300" height="50"></canvas>

      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="time-display">
        <span id="current-time">0:00</span>
        <span id="duration">0:00</span>
      </div>

      <div class="controls">
        <button class="btn" id="prev" title="Предыдущий"><i class="fas fa-backward-step"></i></button>
        <button class="btn play-btn" id="play" title="Воспроизвести"><i class="fas fa-play"></i></button>
        <button class="btn" id="next" title="Следующий"><i class="fas fa-forward-step"></i></button>
      </div>

      <div class="volume-wrap">
        <i class="fas fa-volume-high" style="color: var(--text-secondary); font-size: 0.85rem;"></i>
        <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
      </div>
    </div>
  </div>

  <audio id="audio" crossorigin="anonymous"></audio>

  <script>
    // 📁 Плейлист
    const playlist = [
      { title: "Crystal Light", artist: "Ambient Flow", cover: "https://picsum.photos/seed/track1/400/400", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
      { title: "White Noise", artist: "Clean Beats", cover: "https://picsum.photos/seed/track2/400/400", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
      { title: "Pure Tone", artist: "Minimal Wave", cover: "https://picsum.photos/seed/track3/400/400", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
    ];

    // 🔧 DOM
    const audio = document.getElementById('audio');
    const cover = document.getElementById('cover');
    const coverImg = document.getElementById('cover-img');
    const titleEl = document.getElementById('title');
    const artistEl = document.getElementById('artist');
    const playBtn = document.getElementById('play');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const volumeSlider = document.getElementById('volume');
    const playIcon = playBtn.querySelector('i');
    const canvas = document.getElementById('equalizer');
    const ctx = canvas.getContext('2d');

    let currentTrack = 0;
    let isPlaying = false;
    let audioCtx, analyser, dataArray, source;

    // ⏱️ Формат времени
    const formatTime = (time) => {
      if (isNaN(time)) return '0:00';
      const m = Math.floor(time / 60);
      const s = Math.floor(time % 60);
      return `${m}:${s < 10 ? '0' : ''}${s}`;
    };

    // 🎛️ Инициализация Web Audio API
    const initAudioContext = () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      // Создаем source каждый раз при воспроизведении
      if (!source || source.mediaElement !== audio) {
        try {
          source = audioCtx.createMediaElementSource(audio);
          source.connect(analyser);
          analyser.connect(audioCtx.destination);
        } catch (e) {
          console.error('Error creating audio source:', e);
        }
      }
    };

    //  Загрузка трека
    const loadTrack = (index) => {
      const track = playlist[index];
      titleEl.textContent = track.title;
      artistEl.textContent = track.artist;
      coverImg.src = track.cover;
      audio.src = track.src;
      progressFill.style.width = '0%';
      currentTimeEl.textContent = '0:00';
      durationEl.textContent = '0:00';
      
      // Сбрасываем source при смене трека
      if (source) {
        source.disconnect();
        source = null;
      }
    };

    // 📊 Отрисовка эквалайзера
    const drawEqualizer = () => {
      if (!analyser || !isPlaying) return;
      requestAnimationFrame(drawEqualizer);
      analyser.getByteFrequencyData(dataArray);
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const barCount = dataArray.length;
      const barWidth = (canvas.width / barCount) * 2.2;
      let x = 0;
      
      for (let i = 0; i < barCount; i++) {
        const barHeight = (dataArray[i] / 255) * canvas.height * 0.9;
        const gradient = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - barHeight);
        gradient.addColorStop(0, '#4f46e5');
        gradient.addColorStop(1, '#818cf8');
        
        ctx.fillStyle = gradient;
        ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
        x += barWidth;
      }
    };

    // ▶️⏸️ Управление
    const togglePlay = () => {
      initAudioContext();
      if (isPlaying) {
        audio.pause();
      } else {
        audio.play().catch(e => {
          console.error('Playback failed:', e);
          alert('Не удалось воспроизвести аудио. Проверьте консоль.');
        });
      }
    };

    const updatePlayState = (state) => {
      isPlaying = state;
      playIcon.className = state ? 'fas fa-pause' : 'fas fa-play';
      cover.classList.toggle('playing', state);
      if (state) {
        drawEqualizer();
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    };

    const changeTrack = (dir) => {
      currentTrack = (currentTrack + dir + playlist.length) % playlist.length;
      loadTrack(currentTrack);
      if (isPlaying) {
        audio.play().catch(e => console.error('Playback failed:', e));
      }
    };

    // 📈 События аудио
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      progressFill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
      audio.volume = volumeSlider.value;
    });

    audio.addEventListener('play', () => updatePlayState(true));
    audio.addEventListener('pause', () => updatePlayState(false));
    audio.addEventListener('ended', () => changeTrack(1));
    
    audio.addEventListener('error', (e) => {
      console.error('Audio error:', e);
      alert('Ошибка загрузки аудио');
    });

    // 🖱️ Интерактив
    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', () => changeTrack(-1));
    nextBtn.addEventListener('click', () => changeTrack(1));

    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    });

    volumeSlider.addEventListener('input', (e) => {
      audio.volume = e.target.value;
    });

    // 🚀 Старт
    loadTrack(currentTrack);
  </script>
</body>
</html>
